<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hermanos Energy</title>
  <meta name="description" content="Hermanos Energy is dedicated to providing cutting-edge solutions for energy storage using hydrogen technology. As the world's energy demands continue to grow, it's crucial that we find sustainable and reliable ways to power our lives." />

  <!-- Styles -->
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/pages/home.css" />
</head>
<body>

  <!-- ══════════════════════════════════════════════
       HEADER
  ══════════════════════════════════════════════ -->
  <header class="site-header">
    <div class="container">
      <div class="header-inner">

        <!-- Logo -->
        <a href="/" class="header-logo" aria-label="Hermanos Energy - Home">
          <img src="assets/images/Hermanos-Logo-Green.svg" alt="Hermanos Energy" />
        </a>

        <!-- Desktop nav -->
        <nav class="header-nav" aria-label="Main navigation">
          <a href="product.html" data-i18n="nav.product"></a>
          <a href="aboutus.html" data-i18n="nav.about"></a>
          <a href="contact.html" data-i18n="nav.contact"></a>

          <!-- Language switcher -->
          <div class="lang-switcher" aria-label="Language">
            <button data-lang-btn="en" onclick="I18n.switch('en')">EN</button>
            <span class="lang-switcher-divider" aria-hidden="true"></span>
            <button data-lang-btn="nl" onclick="I18n.switch('nl')">NL</button>
          </div>

          <!-- CTA -->
          <a href="https://www.hermanos.energy/" target="_blank" rel="noopener" class="btn-sign-in" data-i18n="nav.sign_in"></a>
        </nav>

        <!-- Hamburger (mobile) -->
        <button class="hamburger" aria-label="Open menu" aria-expanded="false" aria-controls="mobile-nav">
          <span></span>
          <span></span>
          <span></span>
        </button>

      </div>
    </div>

    <!-- Mobile nav drawer -->
    <nav class="mobile-nav" id="mobile-nav" aria-label="Mobile navigation">
      <a href="product.html" data-i18n="nav.product"></a>
      <a href="aboutus.html" data-i18n="nav.about"></a>
      <a href="contact.html" data-i18n="nav.contact"></a>
      <a href="https://www.hermanos.energy/" target="_blank" rel="noopener" class="btn-sign-in" data-i18n="nav.sign_in" style="align-self:flex-start; margin-top: var(--space-2);"></a>

      <div class="lang-switcher" aria-label="Language">
        <button data-lang-btn="en" onclick="I18n.switch('en')">EN</button>
        <span class="lang-switcher-divider" aria-hidden="true"></span>
        <button data-lang-btn="nl" onclick="I18n.switch('nl')">NL</button>
      </div>
    </nav>
  </header>


  <!-- ══════════════════════════════════════════════
       PAGE CONTENT
  ══════════════════════════════════════════════ -->
  <main class="page-content">

    <!-- ══════════════════════════════════════════════
         HERO
    ══════════════════════════════════════════════ -->
    <section class="hero">
      <div class="hero-bg">
        <img
          src="assets/images/background-hero-section.avif"
          alt=""
          width="1920"
          height="1080"
        />
      </div>
      <div class="hero-content">
        <h1 class="hero-title" data-i18n="home.hero.title"></h1>
        <p class="hero-subtitle" data-i18n="home.hero.subtitle"></p>
        <a href="contact.html" class="btn-contact" data-i18n="home.hero.cta"></a>
      </div>
    </section>

  </main>


  <!-- ══════════════════════════════════════════════
       FOOTER
  ══════════════════════════════════════════════ -->
  <footer class="site-footer">
    <div class="footer-inner">

      <!-- Logo -->
      <a href="/" class="footer-logo" aria-label="Hermanos Energy - Home">
        <img src="assets/images/Hermanos-Logo-Green.svg" alt="Hermanos Energy" />
      </a>

      <!-- Nav links -->
      <nav class="footer-nav" aria-label="Footer navigation">
        <a href="product.html" data-i18n="nav.product"></a>
        <a href="aboutus.html" data-i18n="nav.about"></a>
        <a href="contact.html" data-i18n="nav.contact"></a>
      </nav>

      <!-- Address + copyright — full width, right-aligned -->
      <div class="footer-address">
        <p data-i18n-html="footer.address"></p>
        <p data-i18n="footer.copyright"></p>
      </div>

    </div>
  </footer>


  <!-- Scripts -->
  <script src="js/i18n.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
